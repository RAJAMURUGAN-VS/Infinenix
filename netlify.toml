[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/perplexity/*"
  to = "/.netlify/functions/sonar-proxy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200